<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Issue Fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 40px;
      }
      .issue {
        max-width: 760px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main class="issue">
      <h1>Bug: Enhanced Copy loses source URL</h1>
      <p data-copy-target>
        GitHub fixture: selected issue text should be captured as plain history, transformed as enhanced
        copy, and stored with the page title and URL.
      </p>
    </main>
  </body>
</html>
