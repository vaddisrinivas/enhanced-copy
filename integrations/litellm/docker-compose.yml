services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro
