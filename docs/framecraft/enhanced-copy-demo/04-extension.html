<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./scene.css" />
    <style>
      .scene {
        grid-template-columns: 1fr 0.72fr;
        gap: 60px;
        align-items: center;
      }

      .fake-sites {
        display: grid;
        gap: 18px;
        margin-top: 32px;
      }

      .site-row {
        display: flex;
        justify-content: space-between;
        border: 1px solid #31445c;
        border-radius: 14px;
        background: #101827;
        color: #c7d2e1;
        font-size: 26px;
        font-weight: 900;
        padding: 22px 26px;
      }

      .site-row span:last-child {
        color: #9cff6e;
      }

      .popup {
        width: 520px;
        border-radius: 18px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.48);
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <div>
        <p class="kicker fade-up">Chrome extension</p>
        <h2 class="fade-up delay-1">Works on any website after selection.</h2>
        <p class="subtitle fade-up delay-2">
          Context menu, popup, and shortcut use activeTab. No persistent content script. No global copy hijack.
        </p>
        <div class="fake-sites fade-up delay-3">
          <div class="site-row"><span>GitHub issue</span><span>Debug</span></div>
          <div class="site-row"><span>Reddit thread</span><span>Summarize</span></div>
          <div class="site-row"><span>LinkedIn draft</span><span>Share</span></div>
        </div>
      </div>
      <img class="popup pop delay-2" src="../../assets/enhanced-copy-extension.png" />
    </section>
  </body>
</html>
