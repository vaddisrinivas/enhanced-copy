<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./scene.css" />
    <style>
      .scene {
        grid-template-columns: 0.78fr 1fr;
        gap: 46px;
        align-items: center;
      }

      .screenshot {
        width: 100%;
        max-height: 790px;
        border: 1px solid #31455f;
        border-radius: 14px;
        box-shadow: 0 36px 90px rgba(0, 0, 0, 0.42);
        object-fit: cover;
        object-position: top;
      }

      .bullets {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 34px;
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <div>
        <p class="kicker fade-up">SDK first</p>
        <h2 class="fade-up delay-1">Docs teams add one attribute.</h2>
        <p class="subtitle fade-up delay-2">
          Explain, debug, summarize, ask, and share become native copy actions.
          Normal copy stays normal.
        </p>
        <div class="bullets fade-up delay-3">
          <span class="pill hot">data-enhanced-copy</span>
          <span class="pill">React button</span>
          <span class="pill">Vanilla SDK</span>
        </div>
      </div>
      <img class="screenshot pop delay-2" src="../../assets/enhanced-copy-demo.png" />
    </section>
  </body>
</html>
