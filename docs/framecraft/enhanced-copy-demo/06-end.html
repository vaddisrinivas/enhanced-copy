<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./scene.css" />
    <style>
      .scene {
        place-content: center;
        text-align: center;
        gap: 34px;
      }

      h1 {
        max-width: none;
        font-size: 132px;
      }

      .url-line {
        color: #7dd3fc;
        font-size: 34px;
        font-weight: 950;
      }

      .made {
        color: #9fb0c6;
        font-size: 22px;
        font-weight: 850;
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <p class="kicker fade-up">Enhanced Copy</p>
      <h1 class="fade-up delay-1">Copy should carry intent.</h1>
      <p class="subtitle fade-up delay-2">SDK plus Chrome extension for portable AI-ready copy.</p>
      <p class="url-line fade-up delay-3">github.com/vaddisrinivas/enhanced-copy</p>
      <p class="made fade-up delay-4">Demo video generated with Framecraft.</p>
    </section>
  </body>
</html>
